name: CI

on:
  pull_request:
  push:
    branches:
      - next
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.14"
      - name: Install dependencies
        run: uv sync --python 3.12
      - name: Run tests
        run: uv run python -m pytest
