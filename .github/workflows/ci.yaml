name: CI

on:
  pull_request:
  push:
    branches:
      - next
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.6.14"
      - name: Install dependencies
        run: uv sync --python 3.12
      - name: Run tests
        run: uv run python -m pytest
