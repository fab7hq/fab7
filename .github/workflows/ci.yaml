name: CI

on:
  pull_request:
  push:
    branches:
      - next
      - main

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29" # tested recommendation, not a host requirement
      - name: Install dependencies
        run: uv sync --python 3.14.6 --locked
      - name: Verify source
        run: |
          uv lock --check --python 3.14.6 --no-config
          bash -n install.sh
          uv run --python 3.14.6 --locked python -m compileall -q core/fab7 core/tests
          git diff --check
      - name: Run tests
        run: uv run --python 3.14.6 --locked python -m pytest
