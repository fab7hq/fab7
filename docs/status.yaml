resolved_decisions:
  - id: ext-registry-refresh
    resolution: >-
      Fetch only the fab7hq/ext-registry GitHub contents response for main,
      retain its Git blob SHA and content digest, reject rollback or conflicting
      same-version bytes, and replace the last-known-good pair only after full
      validation.
  - id: extension-package-contract
    resolution: >-
      Registry ZIPs and explicit local builds converge on one closed package,
      immutable installation receipt, executable selector, host integration,
      diagnosis, and uninstall path. Local source uses a manifest-fixed bounded
      non-shell build and a dev-source-digest install identity.

