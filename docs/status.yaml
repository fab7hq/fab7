resolved_decisions:
  - id: host-plugin-source
    resolution: >-
      Review init, ext-list, ext-install, and ext-create once as shared Agent
      Skill templates, then use focused Claude and Codex build adapters to
      render native roots. Reuse the same assembler for Fab7 releases and
      schema-2 extension packages through fab7 ext build. Keep fab7 ext create
      host-neutral as the only deterministic scaffolder and make fab7 ext build
      own explicit target selection; add no adapter or compatibility claim for
      an unsupported host.
  - id: ext-registry-refresh
    resolution: >-
      Fetch only the fab7hq/ext-registry GitHub contents response for main,
      retain its Git blob SHA and content digest, reject rollback or conflicting
      same-version bytes, and replace the last-known-good pair only after full
      validation.
  - id: extension-package-contract
    resolution: >-
      Registry ZIPs and explicit local builds converge on one closed package,
      immutable installation receipt, executable selector, host integration,
      diagnosis, and uninstall path. Schema-1 local source retains its
      manifest-fixed bounded non-shell build. Host-neutral schema-2 source
      declares an entrypoint and canonical skills but no hosts; fab7 ext build
      requires explicit targets and adds them to the package identity. Both use
      a dev-source-digest install identity; the build emits the same package
      contract as a deterministic ZIP without installation.

