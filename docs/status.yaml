resolved_decisions:
  - id: host-plugin-source
    resolution: >-
      Review init, ext-list, ext-install, and ext-create once as shared Agent
      Skill templates, then use focused Claude and Codex build adapters to
      render native roots. Reuse the same assembler for Fab7 releases and
      schema-1 extension packages through fab7 ext build. Keep fab7 ext create
      host-neutral as the only deterministic scaffolder and make fab7 ext build
      own explicit target selection; add no adapter or compatibility claim for
      an unsupported host.
  - id: ext-registry-refresh
    resolution: >-
      Fetch only the fab7hq/ext-registry GitHub contents response for main,
      retain its Git blob SHA and content digest, reject rollback or conflicting
      same-version bytes, and replace the last-known-good pair only after full
      validation.
  - id: extension-package-contract
    resolution: >-
      Registry source bundles and explicit local source converge on one fresh
      uv and PyInstaller native builder, closed package, immutable installation
      receipt, executable selector, host integration, diagnosis, and uninstall
      path. Accept only the four-field schema-1 manifest plus closed
      pyproject.toml and uv.lock, require canonical src/extension.py, and
      automatically discover src, tests, and canonical skills. Generate
      fab7_api, selected hosts, native target, dependency, toolchain, and
      package identities. Retain no parser, zipapp, manifest field, or
      compatibility path for an earlier source, catalog, package, or receipt
      shape.

