name: Fab7 Merge Readiness
description: Run the host-neutral Fab7 merge-readiness check.
inputs:
  working-directory:
    description: Directory where fab7 ci-check should run.
    required: false
    default: "."
  args:
    description: Extra arguments passed to fab7 ci-check.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Install action-pinned Fab7 release
      shell: bash
      env:
        FAB7_ACTION_HOME: ${{ runner.temp }}/fab7-action
        FAB7_ACTION_PROFILE: ${{ runner.temp }}/fab7-action-profile
      run: >-
        bash "${{ github.action_path }}/../install.sh"
        --source "${{ github.action_path }}/.."
        --fab7-home "$FAB7_ACTION_HOME"
        --profile "$FAB7_ACTION_PROFILE"
    - name: Validate and repair project-pinned Fab7
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        FAB7_HOME: ${{ runner.temp }}/fab7-action
      run: >-
        "$FAB7_HOME/bin/fab7" init --json
    - name: Run Fab7 ci-check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        FAB7_HOME: ${{ runner.temp }}/fab7-action
      run: >-
        "$FAB7_HOME/bin/fab7" ci-check ${{ inputs.args }}
